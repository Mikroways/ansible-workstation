---
dependency:
  name: galaxy
  options:
    role-file: meta/requirements.yml
driver:
  name: docker
platforms:
  - name: arch
    image: 'archlinux:base'
    groups:
      - complete
  - name: ubuntu-2204
    image: 'ubuntu:22.04'
    groups:
      - complete
  - name: ubuntu-2404
    image: 'ubuntu:24.04'
    groups:
      - complete
  - name: debian-12
    image: 'debian:12'
    groups:
      - system_packages
  # AlmaLinux deshabilitado por defecto para agilizar CI; habilitar si se
  # necesita validar soporte RedHat.
  # - name: alma-9
  #   image: 'almalinux:9.6'
  #   groups:
  #     - complete
provisioner:
  name: ansible
  inventory:
    group_vars:
      all:
        ansible_user: ansible
        workstation_asdf_tools:
          direnv: [ "2.37.1" ]
          helm: [ "4.2.0" ]
          kubectl: [ "1.36.1" ]
          krew: [ "0.5.0" ]
    host_vars:
      arch:
        workstation_locales: []
verifier:
  name: ansible
