---
name: Tests
on:
  pull_request:
    branches:
      - main

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7
      - name: Setup uv
        uses: astral-sh/setup-uv@v8.3.0
      - name: yamllint
        run: uv run yamllint .
      - name: ansible-lint
        run: uv run ansible-lint .

  molecule:
    name: Molecule (${{ matrix.ansible }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ansible:
          - ansible11
          - ansible13
          - ansible14
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7
      - name: Setup uv
        uses: astral-sh/setup-uv@v8.3.0
      - name: Run molecule
        run: uv run --no-default-groups --group ${{ matrix.ansible }} molecule test
