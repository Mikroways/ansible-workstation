---
name: Tests
on:
  pull_request:
    branches:
      - main

jobs:
  molecule:
    name: Molecule (${{ matrix.ansible }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ansible:
          - ansible11
          - ansible14
    # ansible14 falla hoy por una incompatibilidad de molecule-plugins /
    # community.docker con el templating de ansible-core 2.21 (no del role:
    # el syntax check pasa). No bloquea el PR hasta que el tooling se actualice.
    continue-on-error: ${{ matrix.ansible == 'ansible14' }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Setup uv
        uses: astral-sh/setup-uv@v8
      - name: Run molecule
        run: uv run --no-default-groups --group ${{ matrix.ansible }} molecule test
