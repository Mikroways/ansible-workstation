[tox]
requires =
  tox~= 4.55.0
envlist = py311-ansible-11
skipsdist = true

[gh]
python =
    3.11 = py311-ansible-11

[testenv]
deps =
    10: ansible ~= 10.0
    11: ansible ~= 11.0
    molecule ~= 26.4.0
    molecule-plugins[docker] ~= 25.8.0
    ansible-lint ~= 26.4.0
    yamllint ~= 1.38.0
;commands_pre = ansible-galaxy collection install community.docker
commands = molecule {posargs:test}
setenv =
    TOX_ENVNAME={envname}
    PY_COLORS=1
    ANSIBLE_FORCE_COLOR=1
